<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр изложений ОГЭ + ИИ проверка</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#FFF8E7;color:#2D2D2D;min-height:100vh;overflow-x:hidden;font-size:18px;line-height:1.7;}

.bg-animation{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.cloud{position:absolute;font-size:50px;opacity:0.25;animation:floatCloud linear infinite;}
@keyframes floatCloud{from{transform:translateX(-120px)}to{transform:translateX(calc(100vw + 120px))}}
.star{position:absolute;font-size:24px;opacity:0.35;animation:twinkle 3s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:0.15;transform:scale(0.8)}100%{opacity:0.5;transform:scale(1.15)}}
.flower{position:absolute;font-size:35px;opacity:0.3;animation:sway 4s ease-in-out infinite alternate;}
@keyframes sway{0%{transform:translateY(0) rotate(-5deg)}100%{transform:translateY(-12px) rotate(5deg)}}

.header{position:relative;z-index:10;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);padding:28px 20px;text-align:center;box-shadow:0 8px 32px rgba(118,75,162,0.3);}
.header h1{font-size:2em;font-weight:800;color:#fff;text-shadow:2px 3px 6px rgba(0,0,0,0.2);margin-bottom:6px;}
.header p{color:rgba(255,255,255,0.9);font-size:1em;font-weight:600;}

.container{position:relative;z-index:10;max-width:1050px;margin:0 auto;padding:16px;}

.card{background:#fff;border-radius:22px;padding:28px;margin:18px 0;box-shadow:0 8px 30px rgba(0,0,0,0.08);border:3px solid transparent;animation:fadeInUp 0.4s ease;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}

.section-nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;padding:16px;background:#fff;border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.sec-btn{padding:9px 16px;border:none;border-radius:14px;font-family:inherit;font-size:0.88em;font-weight:700;cursor:pointer;transition:all 0.3s;color:#fff;}
.sec-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.15);}
.sec-btn.active{outline:3px solid #FFD93D;transform:translateY(-2px);}
.c1{background:linear-gradient(135deg,#FF6B9D,#C44DFF)}
.c2{background:linear-gradient(135deg,#4DA6FF,#4D88FF)}
.c3{background:linear-gradient(135deg,#4DFF88,#00C9A7)}
.c4{background:linear-gradient(135deg,#FF8C42,#FFD93D)}
.c5{background:linear-gradient(135deg,#FF6B6B,#ee5a24)}
.c6{background:linear-gradient(135deg,#26de81,#20bf6b)}
.c7{background:linear-gradient(135deg,#a55eea,#8854d0)}
.c8{background:linear-gradient(135deg,#fd9644,#fc5c65)}
.c9{background:linear-gradient(135deg,#45aaf2,#2bcbba)}

.task-nav{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:12px 0;}
.task-btn{padding:7px 14px;border:2px solid #ddd;border-radius:11px;background:#fff;font-family:inherit;font-size:0.82em;font-weight:700;cursor:pointer;transition:all 0.25s;color:#333;}
.task-btn:hover{border-color:#764ba2;background:#f5eeff;}
.task-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;}
.task-btn.done{border-color:#4DFF88;background:#e8fff0;}

.card h2{font-size:1.4em;margin-bottom:10px;color:#764ba2;}
.card h3{font-size:1.15em;margin:18px 0 8px;color:#667eea;}

.audio-box{background:linear-gradient(135deg,#667eea18,#764ba218);border-radius:14px;padding:14px;margin:12px 0;display:flex;align-items:center;gap:10px;border:2px solid #667eea30;}
.audio-box audio{flex:1;height:38px;border-radius:18px;}
.audio-ico{font-size:26px;}

.text-toggle{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 18px;border-radius:11px;font-family:inherit;font-weight:700;font-size:0.92em;cursor:pointer;margin:8px 0;transition:all 0.25s;}
.text-toggle:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(102,126,234,0.35);}

.source-text{background:#f7f8fc;border-left:5px solid #667eea;border-radius:0 14px 14px 0;padding:18px;margin:10px 0;font-size:0.96em;line-height:1.85;max-height:350px;overflow-y:auto;}
.author{display:block;text-align:right;font-style:italic;color:#777;margin-top:8px;}

.hints-btn{background:linear-gradient(135deg,#FFD93D,#FF8C42);color:#333;border:none;padding:11px 22px;border-radius:12px;font-family:inherit;font-weight:800;font-size:0.95em;cursor:pointer;margin:8px 4px;transition:all 0.3s;box-shadow:0 3px 10px rgba(255,217,61,0.3);}
.hints-btn:hover{transform:translateY(-2px);}
.hints-panel{display:none;background:linear-gradient(135deg,#fff9e6,#fff3cd);border:2px solid #FFD93D;border-radius:14px;padding:18px;margin:8px 0;animation:fadeInUp 0.25s ease;}
.hints-panel.show{display:block;}
.hints-panel h4{color:#e67e22;margin-bottom:8px;}
.hints-panel li{padding:6px 10px;margin:4px 0;background:#fff;border-radius:8px;border-left:4px solid #FFD93D;font-size:0.92em;}
.hints-panel ul{list-style:none;padding:0;}

.criteria-info{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:2px solid #FF8C42;border-radius:14px;padding:16px;margin:12px 0;}
.criteria-info h4{color:#e67e22;margin-bottom:8px;}
.cr-row{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:4px 0;background:#fff;border-radius:9px;font-size:0.92em;}
.cr-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:3px 9px;border-radius:7px;font-weight:800;font-size:0.82em;white-space:nowrap;}

.writing-area{width:100%;min-height:180px;padding:18px;border:3px solid #e0e0e0;border-radius:14px;font-family:inherit;font-size:18px;line-height:1.7;resize:vertical;transition:border-color 0.3s;background:#fafbff;}
.writing-area:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.12);}

.word-counter{display:flex;align-items:center;gap:10px;margin:10px 0;padding:10px 14px;border-radius:12px;font-weight:700;font-size:0.95em;transition:all 0.3s;}
.wc-green{background:linear-gradient(135deg,#e8fff0,#c8f7dc);color:#1a8a4a;border:2px solid #4DFF88;}
.wc-orange{background:linear-gradient(135deg,#fff8e1,#ffecb3);color:#e67e22;border:2px solid #FF8C42;}
.wc-red{background:linear-gradient(135deg,#ffe8e8,#ffcdd2);color:#c0392b;border:2px solid #ff6b6b;}

.char-info{font-size:0.82em;color:#999;margin:4px 0;}

.btn{padding:12px 24px;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:0.95em;cursor:pointer;transition:all 0.3s;margin:4px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.btn:hover{transform:translateY(-2px);}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.btn-ok{background:linear-gradient(135deg,#4DFF88,#00C9A7);color:#fff;}
.btn-del{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;}
.btn-copy{background:linear-gradient(135deg,#26de81,#20bf6b);color:#fff;}
.btn-stat{background:linear-gradient(135deg,#fd9644,#fc5c65);color:#fff;}
.btn-ai{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;font-size:1em;padding:14px 28px;}
.btn-ai:hover{box-shadow:0 6px 20px rgba(240,147,251,0.4);}
.btn-ai:disabled{opacity:0.6;cursor:not-allowed;}
.btn-eval{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1.05em;padding:14px 32px;box-shadow:0 4px 15px rgba(102,126,234,0.4);}
.btn-eval:hover{box-shadow:0 8px 25px rgba(102,126,234,0.5);transform:translateY(-3px);}

.nav-row{display:flex;justify-content:space-between;margin-top:18px;flex-wrap:wrap;gap:8px;}

.progress-wrap{background:#fff;border-radius:20px;padding:18px;margin:16px 0;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.prog-bar{background:#e0e0e0;border-radius:16px;height:12px;overflow:hidden;margin:10px 0;}
.prog-fill{height:100%;border-radius:16px;background:linear-gradient(90deg,#667eea,#764ba2,#f093fb);background-size:200% 100%;animation:shimmer 2s linear infinite;transition:width 0.5s;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:1000;display:none;align-items:center;justify-content:center;animation:fadeIn 0.3s;}
.modal-bg.show{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:22px;padding:28px;max-width:580px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:scaleIn 0.3s ease;}
@keyframes scaleIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-close{float:right;background:none;border:none;font-size:1.4em;cursor:pointer;color:#aaa;transition:color 0.2s;}
.modal-close:hover{color:#333;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.stat-card{background:linear-gradient(135deg,#f8f9ff,#eef1ff);border-radius:14px;padding:14px;text-align:center;border:2px solid #667eea18;}
.stat-card .sv{font-size:1.8em;font-weight:800;color:#764ba2;}
.stat-card .sl{font-size:0.78em;color:#777;font-weight:600;}

.confetti{position:fixed;width:8px;height:8px;border-radius:2px;z-index:1000;animation:cfall linear forwards;pointer-events:none;}
@keyframes cfall{0%{transform:translateY(-100vh) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ====== ПАНЕЛЬ РЕЗУЛЬТАТОВ ====== */
.results-panel{
  display:none;
  background:linear-gradient(135deg,#f8f9ff,#eef1ff);
  border:3px solid #667eea40;
  border-radius:24px;
  padding:0;
  margin:24px 0;
  overflow:hidden;
  animation:slideResults 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.results-panel.show{display:block;}
@keyframes slideResults{
  from{opacity:0;transform:translateY(40px) scale(0.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.results-header{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  padding:20px 24px;
  text-align:center;
}
.results-header h3{font-size:1.3em;font-weight:800;margin-bottom:4px;}
.results-header .subtitle{font-size:0.9em;opacity:0.8;}

.total-score{
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#fff,#f8f9ff);
}
.total-score .big-number{
  font-size:4em;
  font-weight:900;
  background:linear-gradient(135deg,#667eea,#f093fb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.total-score .big-max{
  font-size:1.2em;
  color:#999;
  font-weight:600;
}
.total-score .grade-label{
  font-size:1em;
  font-weight:700;
  margin-top:8px;
  padding:4px 16px;
  border-radius:20px;
  display:inline-block;
}
.grade-excellent{background:#e8fff0;color:#1a8a4a;}
.grade-good{background:#e8f4ff;color:#2980b9;}
.grade-average{background:#fff8e1;color:#b8860b;}
.grade-poor{background:#ffe8e8;color:#c0392b;}

.criteria-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  padding:20px 24px;
}

.criteria-card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.06);
  border-left:5px solid #ddd;
  animation:fadeInUp 0.5s ease;
  animation-fill-mode:both;
}
.criteria-card:nth-child(1){animation-delay:0.1s;border-left-color:#4DFF88;}
.criteria-card:nth-child(2){animation-delay:0.2s;border-left-color:#4DA6FF;}
.criteria-card:nth-child(3){animation-delay:0.3s;border-left-color:#FFD93D;}
.criteria-card:nth-child(4){animation-delay:0.4s;border-left-color:#f093fb;}

.criteria-card .cr-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.criteria-card .cr-label{
  font-weight:800;
  font-size:1em;
  color:#333;
}
.criteria-card .cr-score{
  font-size:1.4em;
  font-weight:900;
}
.criteria-card .cr-score.s2{color:#4DFF88;}
.criteria-card .cr-score.s1{color:#FFD93D;}
.criteria-card .cr-score.s0{color:#ff6b6b;}

.feedback-items{list-style:none;padding:0;}
.feedback-items li{
  padding:6px 0;
  font-size:0.88em;
  display:flex;
  align-items:flex-start;
  gap:6px;
  line-height:1.4;
}
.feedback-items .icon{
  font-size:1em;
  flex-shrink:0;
  margin-top:1px;
}
.feedback-items .ok{color:#4DFF88;}
.feedback-items .warn{color:#FFD93D;}
.feedback-items .err{color:#ff6b6b;}

.results-footer{
  padding:16px 24px;
  background:#f8f9ff;
  border-top:1px solid #667eea20;
  text-align:center;
}
.results-footer p{font-size:0.85em;color:#777;margin-bottom:8px;}

.highlighted-text{background:#fff;border:2px solid #e0e0e0;border-radius:16px;padding:20px;line-height:2.2;font-size:18px;white-space:pre-wrap;word-wrap:break-word;margin:16px 24px;}
.ai-err{color:#e74c3c;font-weight:700;background:#ffe8e8;padding:2px 5px;border-radius:5px;text-decoration:underline wavy #e74c3c;cursor:help;position:relative;}
.ai-err:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 10px;border-radius:8px;font-size:0.75em;white-space:nowrap;z-index:100;font-weight:400;}

.ai-section{display:none;margin:16px 0;animation:fadeInUp 0.4s ease;}
.ai-section.show{display:block;}

.loading-spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

@media(max-width:768px){
.header h1{font-size:1.4em;}
.card{padding:18px;margin:10px 0;}
.sec-btn{padding:7px 11px;font-size:0.8em;}
.stat-grid{grid-template-columns:1fr;}
.criteria-grid{grid-template-columns:1fr;}
.total-score .big-number{font-size:3em;}
}

@media(max-width:480px){
.results-header h3{font-size:1.1em;}
.criteria-grid{padding:14px;}
.total-score .big-number{font-size:2.5em;}
}
</style>
</head>
<body>

<div class="bg-animation" id="bgAnim"></div>

<div class="header">
<h1>🎓 Тренажёр изложений ОГЭ</h1>
<p>Сжатый пересказ + 🤖 ИИ-проверка + 📊 Панель результатов</p>
</div>

<div class="container">

<div class="progress-wrap">

</div>

<div class="task-nav" id="taskNav"></div>
<div id="main"></div>

</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeStats()">
<div class="modal">
<button class="modal-close" onclick="closeStats()">✕</button>
<h2 style="color:#764ba2;margin-bottom:14px;">📈 Статистика</h2>
<div id="modalBody"></div>
</div>
</div>

<script>
// ====== ДАННЫЕ ======
var DATA=[
{s:"🗣️ Язык и речь",c:"c1",tasks:[
{id:"1.01",title:"«С самого раннего детства жизнь связана с языком…»",author:"По Л.В. Успенскому",
text:"С самого раннего детства и до глубокой старости жизнь человека неразрывно связана с языком. Ребёнок ещё не научился как следует говорить, а его слух уже ловит журчание бабушкиных сказок, материнской колыбельной песенки.\n\nПодросток идёт в школу. Юноша шагает в институт или университет. Целое море слов, шумный океан речи подхватывает его там. Сквозь живые беседы учителей и страницы книг впервые видится ему отражённая в слове необъятная и сложная Вселенная. Человек роднится с древними мыслями, с теми, что сложились в головах людей за тысячелетия до его рождения. Сам он обретает возможность обращаться к потомкам, которые будут жить спустя века после его кончины. И всё это благодаря языку.\n\nПрежде чем вывести первую строчку на странице, каждый автор долго обдумывает её содержание. Видели, как пестрят поправками в поисках самого верного слова бессмертные страницы черновиков Льва Толстого или Пушкина. И вы сами, прочтя взволновавшую вас новую книгу, начнёте размышлять над тем, что только что узнали. Все мы постоянно думаем. А можно ли думать без слов? Всё, что люди совершают в мире действительно человеческого, совершается при помощи языка. Без него немыслимо ни на шаг двинуть вперёд науку, технику, ремёсла, искусство, жизнь.",
mt:["Роль языка в жизни человека","Язык как средство познания мира","Значение языка для мышления и развития"]},
{id:"1.02",title:"«Где бы вы ни были – прислушивайтесь к языку…»",author:"По К.Г. Паустовскому",
text:"Где бы вы ни были – в городе или деревне, в вагоне поезда или на палубе речного парохода, на севере или юге России, в лесу или на степной дороге – всюду прислушивайтесь к русскому языку, к певучему народному говору, запоминайте и впитывайте в себя этот единственный по богатству, образности и поэтичности язык – поистине самый свободный и волшебный из всех языков мира.\n\nС русским языком можно творить чудеса. Нет ничего такого в окружающей нас жизни и в нашем сознании, чего нельзя было бы передать русским словом. И звучание музыки, и блеск красок, и шум садов, и сказочные сновидения, и тяжёлые громыхания грозы, и детский лепет, и заунывный ропот прибоя, и гнев, и великую радость. Нет таких мыслей, понятий, звуков, красок и образов – сложных и простых, – для которых не нашлось бы в нашем языке точного выражения.\n\nПрав был Тургенев, когда говорил, что такой язык может быть дан только великому народу. Русский язык поистине народен. Он является наилучшим выражением сущности русского человека. Сколько бы мы его ни изучали, он всегда будет производить на нас впечатление радостного чуда. Необходимо любить русский язык, изучать его, хранить и обогащать словами, рождёнными нашей эпохой, но словами, достойными этого великого языка.",
mt:["Богатство русского языка","Выразительные возможности речи","Бережное отношение к языку"]},
{id:"1.03",title:"«Самая большая ценность народа – его язык…»",author:"По Д.С. Лихачёву",
text:"Самая большая ценность народа – его язык. Язык, на котором он читает, пишет, говорит, думает. Думает! Ведь это значит, что вся сознательная жизнь человека проходит через родной ему язык. Эмоции, ощущения только окрашивают то, о чем мы думаем, или подталкивают мысль в каком-то отношении, но все наши мысли формулируются языком.\n\nВернейший способ узнать человека – его умственное развитие, его моральный облик, его характер – прислушаться к тому, как он говорит. Если мы замечаем манеру человека себя держать, его походку, его поведение, и по ним судим о человеке, иногда, впрочем, ошибочно, то язык человека – гораздо более точный показатель его человеческих качеств, его культуры.\n\nКаждый человек пользуется языком народа. В языке отразились «внутренние силы» народа — его склонность к эмоциональности, разнообразие в нем характеров и типов отношения к миру. Если верно, что в языке народа сказывается его национальный характер, то национальный характер русского народа чрезвычайно внутренне разнообразен, богат, противоречив. И все это отразилось в языке. Именно поэтому нужно понимать историю слов и выражений, знать фразеологизмы, поговорки и пословицы, родную литературу. Язык, отторгнутый от истории народа, станет песком во рту.",
mt:["Язык как основа культуры","Речь как показатель личности","Связь языка с историей народа"]}
]},
{s:"🎨 Искусство, литература, книга",c:"c2",tasks:[
{id:"2.01",title:"«Самая большая ценность, которой награждает человека искусство…»",author:"По Д.С. Лихачёву",
text:"Самая большая ценность, которой награждает человека искусство, – это ценность доброты. Имея дар понимать искусство, человек становится нравственно лучше, а следовательно, счастливее. Ибо, понимая мир, окружающих его людей, прошлое и далёкое, человек быстрее находит общий язык с другими людьми, с другими культурами, с другими национальностями, ему легче жить.\n\nИскусство вызывает в читателе, зрителе сопереживание и сочувствие людям, всему человечеству. Оно заставляет с большим вниманием и пониманием относиться к чужой боли, чужой радости. Искусство идёт от человека и ведёт к человеку – к самому живому, доброму, лучшему в нём. Как говорил Лев Николаевич Толстой, оно служит единению человеческих душ.\n\nНо понимать произведение искусства далеко не просто. Этому надо учиться – учиться долго, всю жизнь. Ведь искусство сталкивает нас всё время с новыми и новыми явлениями, и в этом его громадная щедрость. Самое важное в искусстве – это искренность, честность, открытость к восприятию его человеком. Нельзя быть слепым к красоте, глухим к слову, и настоящей музыке, чёрствым к добру, беспамятным к прошлому. Необходимы ещё и знания – фактические сведения по истории искусства, по истории памятника, биографические сведения о его создателе, которые помогают эстетическому восприятию искусства, оставляя его свободным. Знания раскрывают двери, но войти в них мы должны сами.",
mt:["Искусство и нравственность","Искусство как средство объединения","Необходимость понимания искусства"]},
{id:"2.02",title:"«Человек соприкасается с искусством каждый день…»",author:"По М.Д. Аксёновой",
text:"Человек соприкасается с искусством каждый день не только в музеях. С самого рождения и на протяжении всей жизни люди погружены в волшебный и таинственный мир искусства. Здания, интерьер квартиры, одежда и ювелирные украшения – всё это может быть произведениями искусства. Но может и не быть. Не каждую картину, статую, песню и каждый фарфоровый сервис считают шедеврами.\n\nКак отличить произведение искусства от ремесленных поделок? Не существует рецепта, где было бы точно изложено, что и в каких пропорциях можно соединить, чтобы получилось подлинное произведение искусства. Однако можно развить в себе способность чувствовать и ценить прекрасное, которую мы называем «искусством».\n\nИскусство – это форма познания мира. Но методы искусства совершенно не похожи на научные. Кинофильмы сжимают целую человеческую жизнь до двухчасового действия. Некоторые художники сознательно нарушают пропорции тела человека. Именно такие художественные эксперименты позволяют зрителю сосредоточиться на главном: рассмотреть то, что в повседневной жизни он просто не замечает. Иногда происходит чудо: искусство меняет людей. Человек, попадая в притягательный мир искусства, задумывается о тайне красоты, начинает чувствовать в себе стремление к творчеству. Весь смысл жизни может стать совершенно другим. Может быть, это и есть главное предназначение искусства – позволить человеку познать самого себя.",
mt:["Искусство в повседневной жизни","Развитие чувства прекрасного","Искусство как познание себя"]},
{id:"2.03",title:"«В современном мире нет человека, который не соприкасался бы с искусством…»",author:"По Г.И. Беленькому",
text:"В современном мире нет человека, который не соприкасался бы с искусством. Его значение в нашей жизни велико. Книга, кино, телевидение, театр, музыка, живопись прочно вошли в нашу жизнь и оказывают на неё огромное влияние. Но особенно сильно воздействует на человека художественная литература.\n\nКогда вы открываете незнакомую книгу, то остаётесь один на один с большим и умным другом – писателем. Читаете одну страницу, другую – и вдруг совершается чудо! Перед вами разворачиваются удивительные картины: герои отправляются в путешествия, сражаются с врагами, спасают друзей, открывают тайны природы. И вместе с ними вы тоже путешествуете, участвуете в спорах, вступаете в бой, терпите поражения и побеждаете. Сила художественного слова, музыка стиха, выразительность авторской речи покоряют и завораживают читателя.\n\nСоприкосновение с миром искусства доставляет нам радость и бескорыстное наслаждение. Но неправильно было бы видеть в произведениях писателей, композиторов, художников только средство получения удовольствия. Конечно, мы нередко идём в кинотеатр, садимся к телевизору, берём в руки книгу, чтобы отдохнуть и развлечься. Да и сами художники, писатели, композиторы так строят свои произведения, чтобы поддержать и развить интерес и любопытство зрителей, читателей, слушателей. Но значение искусства в нашей жизни намного серьёзнее. Оно помогает человеку лучше увидеть и понять окружающий мир и самого себя.\n\nИскусство способно сохранять характерные черты эпохи, дарить людям возможность общаться друг с другом через десятилетия и века, становясь своеобразным хранилищем памяти для последующих поколений. Оно незаметно формирует взгляды и чувства, характер, вкусы человека, пробуждает любовь к прекрасному. Именно поэтому в трудные минуты жизни люди нередко обращаются к произведениям искусства, которые становятся источником духовной силы и мужества.",
mt:["Влияние искусства на человека","Роль художественной литературы","Искусство как способ понимания мира"]},
{id:"2.04",title:"«Можно ли одной формулой определить, что такое искусство…»",author:"По Ю.В. Бондареву",
text:"Можно ли одной исчерпывающей формулой определить, что такое искусство? Нет, конечно. Искусство – это очарование и колдовство, это выявление смешного и трагедийного, это мораль и безнравственность, это познание мира и человека. В искусстве человек создаёт свой образ как нечто отдельное, способное существовать вне его самого и остаться после него как его след в истории.\n\nМомент обращения человека к творчеству, быть может, является величайшим открытием, не имеющим себе равного в истории. Ведь через искусство каждый отдельный человек и народ в целом осмысляет свои особенности, свою жизнь, своё место в мире. Искусство позволяет соприкоснуться с личностями, народами и цивилизациями, отдалёнными от нас временем и пространством. И не просто соприкоснуться, а узнать и понять их, потому что язык искусства универсален, и именно он даёт возможность человечеству ощутить себя как единое целое.\n\nВот почему ещё с глубокой древности сформировалось отношение к искусству не как к развлечению или забаве, а как к могучей силе, способной не только запечатлеть образ времени и человека, но и передать его потомкам.",
mt:["Многогранность искусства","Искусство как самовыражение","Объединяющая роль искусства"]},
{id:"2.05",title:"«Нам лишь кажется, что…»",author:"По Л.Г. Гинзбург и Е.Б. Кононовой",
text:"Нам лишь кажется, что, когда с нами что-то случается, это уникальное явление, единственное в своём роде. На самом деле нет ни одной проблемы, которая уже не была бы отражена в мировой литературе: любовь, верность, ревность, измена, трусость, поиски смысла жизни. Всё это уже когда-то кем-то было пережито, передумано; найдены причины, ответы и запечатлены на страницах художественной литературы. Дело за малым: бери и читай! И всё найдёшь в книге.\n\nЛитература, открывая мир с помощью слова, творит чудо: удваивает, утраивает наш внутренний опыт, беспредельно расширяет взгляд на жизнь, на человека, делает тоньше наше восприятие. В детские годы мы читаем сказки и приключения, чтобы пережить азарт поиска, интриги. Но наступает час, когда мы испытываем потребность открыть книгу для того, чтобы с её помощью углубиться в себя. Это час взросления: мы ищем в книге собеседника, который просветляет, облагораживает, учит.\n\nВот мы взяли в руки книгу. Что происходит в нашей душе? С каждой прочитанной книгой, распахивающей перед нами кладовые мысли и чувств, мы становимся другими. С помощью литературы человек становится Человеком. Неслучайно книгу называют учителем и учебником жизни.",
mt:["Универсальность жизненных проблем","Литература как опыт человечества","Влияние чтения на личность"]},
{id:"2.06",title:"«Каждый писатель тревожится о том…»",author:"По И.А. Ильину",
text:"Каждый писатель тревожится о том, как его будут читать. Поймут ли? Почувствуют ли то, что любило его сердце? От этого зависит так много. И прежде всего – состоится ли у него желанная духовная встреча с теми далёкими, но близкими, для которых он писал свою книгу?\n\nИ вот мы, читатели, берёмся за эту книгу. Перед нами чувства, идеи, образы, целое здание духа, которое даётся нам как бы при помощи шифра. Оно скрыто за буквами, общеизвестными словами и образами. Жизнь, яркость, силу, смысл должен из-за них добыть сам читатель. Он должен воссоздать в себе созданное автором; и если он не умеет, не хочет и не сделает этого, то за него не сделает этого никто: книга пройдёт мимо него.\n\nОбычно думают, что чтение доступно всякому грамотному. Но, к сожалению, это совсем не так. Ведь настоящий читатель отдаёт книге все своё внимание, все свои душевные способности, которые необходимы для понимания этой книги. Настоящее чтение не сводится к механическому соединению слов. Оно требует твёрдого желания услышать голос автора.\n\nИскусство чтения побеждает одиночество, разлуку, время и расстояние. Оно помогает чувствовать связь с другими людьми и вместе с автором постигать сущность мира. Читать – значит искать и находить, потому что читатель как бы отыскивает скрытый писателем духовный клад. Это творческий процесс, потому что воспроизводить – значит творить.",
mt:["Связь автора и читателя","Роль читателя в понимании текста","Чтение как творчество"]},
{id:"2.07",title:"«Книга – великий хранитель…»",author:"По Д.С. Лихачёву",
text:"Книга – великий хранитель и двигатель человеческой культуры. Книгу ничем нельзя заменить. Издавна её называют источником мудрости. И действительно, сложный философский текст можно передать только через книгу. Читатель сам владеет текстом. Он может читать быстрее или медленнее, поверхностно проглядывать его или внимательно перечитывать, возвращаясь к уже прочитанному месту, или заглянуть в конец книги. Читатель, в отличие от слушателя или зрителя, абсолютно свободен.\n\nА теперь обратимся к телевидению. Оно становится бедой, только когда становится «пожирателем человеческого времени». Когда оно лишает человека свободы, предоставляемой ему книгой, когда сидящий у телевизора слепо подчиняется зрительным и слуховым впечатлениям. И телевидение – величайшее благо тогда, когда оно показывает то, что мы иным способом не могли бы увидеть, когда оно позволяет совершить небольшое путешествие в те области бытия, к которым у нас нет иного доступа.\n\nЧеловек должен быть внутренне свободен, а для этого он должен уметь сам оценивать окружающее и быть образован. Образование же и самостоятельность даёт именно книга. Видеть и слышать – это ещё не всё. Надо ещё и думать, воспринимать мир разумом, а для этого недостаточно сидеть у телевизора, необходимо уметь задумываться о важном в тишине – той тишине, что рождает самостоятельную мысль.",
mt:["Книга как источник знаний","Преимущества чтения","Роль книги в развитии личности"]},
{id:"2.08",title:"«Какой бы интересной ни была домашняя…»",author:"По С. Михалкову",
text:"Какой бы интересной ни была домашняя и школьная жизнь ребёнка, не прочти он драгоценных книг – он обделён. Такие утраты невосполнимы. Это взрослые могут прочесть книжку сегодня или через год – разница невелика. В детстве счёт времени ведётся иначе, тут каждый день – открытия. И острота восприятия в дни детства такова, что ранние впечатления могут влиять потом на всю жизнь. Впечатления детства – самые яркие и прочные впечатления. Это фундамент будущей духовной жизни, золотой фонд.\n\nВ детстве посеяны семена. Не все прорастут, не все расцветут. Но биография человеческой души – это постепенное прорастание семян, посеянных в детстве.\n\nПоследующая жизнь сложна и многообразна. Она состоит из миллионов поступков, определяющихся многими чертами характера и, в свою очередь формирующих этот характер. Но если проследить и найти связь явлений, то станет очевидным, что всякая черта характера взрослого человека, всякое качество его души и, может быть, даже всякий его поступок были посеяны в детстве, имели с тех пор свой зародыш, своё семечко.",
mt:["Значение чтения в детстве","Влияние детских впечатлений","Формирование характера"]}
]},
{s:"🏫 Образование и школа",c:"c3",tasks:[
{id:"3.01",title:"«Мне повезло с учителями…»",author:"По И.А. Ефремову",
text:"Мне повезло с учителями: на пути оказались хорошие, высокой души люди. Настоящие педагоги, сумевшие разглядеть в малообразованном, плохо воспитанном, подчас просто грубом мальчишке какие-то способности. Но мне думается, что если бы этого не случилось, то всё равно я бы продолжал преодолевать все трудности учения. Воля, как и всё остальное, требует закалки и постоянных упражнений. То, что казалось трудным вчера, становится лёгким сегодня, если не уступать минутной слабости, а бороться с собой шаг за шагом.\n\nТренировка стойкости и воли проходит незаметно. Когда учишься ездить на машине, трудно справляться с её управлением и следить за дорогой, знаками, пешеходами. И вдруг перестаёшь замечать свои действия, машина становится послушной и не требующей напряжённого внимания. Так и с трудностями в жизни. Привычка к их преодолению приходит незаметно: учиться становится легко, только нельзя распускаться и жалеть себя.\n\nТоварищи будут с уважением называть справляющегося с трудностями человека собранным, волевым, мужественным, а он будет удивляться: что такого особенного в нём нашли? И если вы действительно стремитесь к знаниям, то не поддавайтесь слабости, никогда не отказывайтесь от своего решения учиться. Дорогу осиливает и ослабевший человек, пока он идёт. Если он упадёт, ему будет трудно подняться, намного труднее, чем продолжать идти.",
mt:["Роль учителя","Воспитание воли","Преодоление трудностей"]},
{id:"3.02",title:"«Хороших книг о школе написано немало…»",author:"По Д.А. Гранину",
text:"Хороших книг о школе написано немало. Но мне интересно было бы исследовать одну линию в этой огромной теме: что остаётся от учителя, от класса в характере человека, кроме знаний. В сущности, у каждого взрослого есть свои впечатления, свои воспоминания о школе. Плохие или хорошие. Одни учителя помнятся, другие нет. Одни классные товарищи врезались в память, другие забылись. И не всегда это можно объяснить степенью дружбы. Нет, тут действуют иные, глубоко скрытые, очевидно, сложные причины.\n\nКроме талантливых учителей есть и другие, любимые учителя. Наверное, любимых учителей больше, чем талантливых. Наверное, можно заслужить любовь, даже не имея отпущенных природой педагогических способностей. Талантливым стать нельзя, а вот любимым стать можно.\n\nНаша любовь к учителям рождалась по-разному. Как и все, я вспоминаю бывших своих учителей. Кто из них получал нашу любовь? Физику преподавал нам известный профессор. Он блестяще ставил опыты, умел рассказать материал доходчиво, образно, но… Но! Но физику мы полюбили раньше, полюбили благодаря молоденькой учительнице Ксении Евгеньевне. Кажется, она преподавала тогда первый год и не очень хорошо сама знала некоторые тонкости, но всё равно мы ее любили. Вероятно, за то, что она любила нас, за то, что ей было весело с нами, интересно, за то, что она не скрывала своих промахов и открыто переживала их.",
mt:["Влияние школы","Значение учителя","Роль отношений в обучении"]}
]},
{s:"🤝 Дружба и человеческие отношения",c:"c4",tasks:[
{id:"4.01",title:"«Дружба — это не что-то внешнее…»",author:"По материалам Интернета",
text:"Дружба — это не что-то внешнее. Дружба лежит глубоко в сердце. Нельзя заставить себя быть другом кому-то или заставить кого-то быть твоим другом.\n\nДля дружбы нужно очень многое, прежде всего взаимное уважение. Что означает уважать своего друга? Это значит считаться с его мнением и признавать его положительные черты. Уважение проявляется в словах и делах. Друг, к которому проявляется уважение, чувствует, что его ценят как личность, уважают его достоинства и помогают ему не только лишь из чувства долга. В дружбе важно доверие, то есть уверенность в искренности друга, в том, что он не предаст и не обманет. Конечно, друг может совершать ошибки. Но ведь все мы несовершенны. Это два основных и главных условия для дружбы. Кроме этого, для дружбы важны, например, общие нравственные ценности. Людям, которые по-разному смотрят на то, что есть добро, а что зло, будет тяжело быть друзьями. Причина простая: сможем ли мы проявлять к другу глубокое уважение и, возможно, доверие, если видим, что он совершает поступки недопустимые, по нашему мнению, и считает это нормой. Укрепляют дружбу и общие интересы или увлечения. Однако для дружбы, которая существует давно и проверена временем, это не принципиально.\n\nДружеские чувства не зависят от возраста. Они могут быть очень сильными и приносить человеку множество переживаний. Но без дружбы жизнь немыслима.",
mt:["Сущность дружбы","Уважение и доверие","Значение дружбы"]},
{id:"4.02",title:"«Есть ценности, которые изменяются…»",author:"",
text:"Есть ценности, которые изменяются, теряются, пропадают, становясь пылью времени. Но как бы ни изменялось общество, всё равно на протяжении тысячелетий остаются вечные ценности, которые имеют большое значение для людей всех поколений и культур. Одной из таких вечных ценностей, безусловно, является дружба.\n\nЛюди очень часто употребляют это слово в своём языке, тех или иных людей называют своими друзьями, но мало кто может сформулировать, что такое дружба, кто такой настоящий друг, каким он должен быть. Все определения дружбы сходны в одном: дружба – это взаимоотношения, основанные на взаимной открытости людей, полном доверии и постоянной готовности в любой момент прийти друг другу на помощь.\n\nГлавное, чтобы у друзей были одинаковые жизненные ценности, похожие духовные ориентиры, тогда они смогут дружить, даже если их отношение к определённым явлениям жизни разное. И тогда на настоящую дружбу не влияет время и расстояние. Люди могут разговаривать друг с другом лишь изредка, быть в разлуке в течение многих лет, но всё равно оставаться очень близкими друзьями. Подобное постоянство – отличительная черта настоящей дружбы.",
mt:["Дружба как ценность","Признаки настоящей дружбы","Независимость от времени"]},
{id:"4.03",title:"«Что же действительно заключается в этом…»",author:"По материалам Интернета",
text:"Что же действительно заключается в этом, казалось бы, привычном для всех понятии дружба? Если говорить по-научному, то дружба — это бескорыстные взаимоотношения между людьми, которые основываются на общих симпатиях, интересах и увлечениях. Настоящий друг всегда рядом, плохо ли нам, хорошо ли. Он никогда не попытается воспользоваться вашей слабостью в своих целях и всегда придёт на помощь, когда он так нужен. Он не только поможет в беде, но и искренне порадуется в минуты счастья вместе с вами.\n\nНо, к сожалению, подобные отношения постепенно сходят на нет. Бескорыстная дружба понемногу становится пережитком прошлого. Друзья сейчас для нас — это люди, способные помочь в том или ином вопросе, или те, с кем можно неплохо провести время. На деле же, если у кого-то из якобы близких друзей случается кризис, друзья куда-то испаряются до тех пор, пока этот кризис не пройдёт. Эта ситуация знакома практически каждому. Одним словом, выгодная дружба стремительно вытесняет дружбу бескорыстную.\n\nМы должны помнить, что многие проблемы, кажущиеся грандиозными и пугающими, без особого труда можно решить, если рядом есть надёжные друзья. Дружба даёт уверенность в завтрашнем дне. Она делает человека смелее, свободнее и оптимистичнее, а жизнь его - теплее, интереснее и многограннее. Верная дружба духовно объединяет людей, способствуя развитию в них стремления к созиданию, а не разрушению.",
mt:["Определение дружбы","Проблема утраты дружбы","Значение дружбы"]},
{id:"4.04",title:"«Испытания ждут дружбу всегда…»",author:"По Н.П. Крыщуку",
text:"Испытания ждут дружбу всегда. Главное из них сегодня – изменившийся уклад, перемена в образе и распорядке жизни. С ускорением темпа жизни, со стремлением быстро реализовать себя пришло понимание значимости времени. Раньше невозможно было представить, например, чтобы хозяева тяготились гостями. Теперь, когда время – цена достижения своей цели, отдых и гостеприимство перестали быть значимыми. Частые встречи и неторопливые беседы не являются уже непременными спутниками дружбы. В силу того что живём мы в разных ритмах, встречи друзей становятся редкими.\n\nНо вот парадокс: раньше круг общения был ограничен, сегодня человека угнетает избыточность вынужденного общения. Особенно это заметно в городах с высокой плотностью населения. Мы стремимся обособиться, выбрать уединённое место в метро, в кафе, в читальном зале библиотеки.\n\nКазалось бы, такая избыточность обязательного общения и стремление к обособленности должны свести потребность в дружбе к минимуму, сделать её навсегда неактуальной. Но это не так. Отношения с друзьями остаются на первом месте. Их существование согревает душу уверенностью, что нам всегда есть с кем поделиться радостью и к кому обратиться за помощью в самую трудную минуту.",
mt:["Изменения в дружбе","Проблема общения","Значение дружбы"]},
{id:"4.05",title:"«Когда я учился в школе…»",author:"По Д.С. Лихачёву",
text:"Когда я учился в школе, мне казалось, что моя взрослая жизнь будет проходить в какой-то иной обстановке, как бы в ином мире, и меня будут окружать другие люди. А на самом деле сложилось всё иначе. Мои сверстники остались со мной. Друзья молодости оказались самыми верными. Круг знакомых возрос необычайно. Но настоящие друзья, старые, подлинные друзья, приобретаются в молодости. Молодость — это время сближения.\n\nДрузей следует помнить и беречь, ибо настоящая дружба очень помогает и в горе, и в радости. В радости тоже нужна помощь, чтобы ощутить счастье до глубины души и поделиться им. Неразделённая радость не радость. Когда же наступит пора несчастий, пора утрат, тоже нельзя быть одному. Горе человеку, если он один.\n\nПоэтому берегите молодость до глубокой старости. Цените всё хорошее, что приобрели в молодые годы, не теряйте друзей. Ничто из приобретённого в молодости не проходит бесследно. Хорошие навыки молодости облегчат жизнь. Дурные усложнят её и затруднят. Помните русскую пословицу: «Береги честь смолоду»? В памяти остаются все поступки, совершённые в молодости. Хорошие будут радовать. Дурные не дадут спать.",
mt:["Дружба молодости","Роль друзей","Необходимость беречь дружбу"]}
]},
{s:"👨‍👩‍👧 Семья и любовь",c:"c5",tasks:[
{id:"5.01",title:"«Слово «мама» — особое слово»",author:"По материалам Интернета",
text:"Слово «мама» — особое слово. Оно рождается вместе с нами, сопровождает нас в годы взросления и зрелости. Его лепечет дитя в колыбели. С любовью произносит юноша и глубокий старец. В языке любого народа есть это слово. И на всех языках оно звучит нежно и ласково.\n\nМесто матери в нашей жизни особое, исключительное. Мы всегда несём ей свою радость и боль и находим понимание. Материнская любовь окрыляет, придаёт силы, вдохновляет на подвиг. В сложных жизненных обстоятельствах мы всегда вспоминаем маму. И нужна нам в этот миг только она. Человек зовёт мать и верит, что она, где бы ни была, слышит его, сострадает и спешит на помощь. Слово «мама» становится равнозначным слову «жизнь».\n\nСколько художников, композиторов, поэтов создали замечательные произведения о маме! «Берегите матерей!» — провозгласил в своей поэме известный поэт Расул Гамзатов. К сожалению, мы слишком поздно понимаем, что забыли сказать много хороших и добрых слов своей маме. Чтобы этого не произошло, нужно дарить им радость каждый день и час. Ведь благодарные дети – лучший подарок для них.",
mt:["Значение слова «мама»","Роль матери","Забота о матерях"]},
{id:"5.02",title:"«Иметь семью и детей так же необходимо…»",author:"По В. Белову",
text:"Иметь семью и детей так же необходимо и естественно, как необходимо и естественно трудиться. Семья издавна скреплялась нравственным авторитетом отца, который традиционно считался главой. Отца дети уважали и слушались. Он занимался сельхозработами, строительством, заготовкой леса и дров. Всю тяжесть крестьянского труда с ним разделяли взрослые сыновья.\n\nРуководство домашним хозяйством было в руках жены и матери. Она ведала всем в доме: присматривала за скотом, заботилась о питании, об одежде. Все эти работы она делала не одна: даже дети, едва научившись ходить, понемногу, вместе с игрой, начинали делать что-то полезное.\n\nДоброта, терпимость, взаимное прощение обид перерастали в хорошей семье во взаимную любовь. Сварливость и неуживчивость считались наказанием судьбы и вызывали жалость к их носителям. Надо было уметь уступить, забыть обиду, ответить добром или промолчать. Любовь и согласие между родственниками давали начало любви за пределами дома. От человека, не любящего и не уважающего своих родных, трудно ждать уважения к другим людям.",
mt:["Значение семьи","Семейные роли","Основа семьи"]},
{id:"5.03",title:"«Времена меняются…»",author:"По Е. Семибратовой",
text:"Времена меняются, приходят новые поколения, у которых, казалось бы, всё не такое, как у прежних: вкусы, интересы, жизненные цели. Но трудноразрешимые личные вопросы между тем почему-то остаются неизменными. Нынешних подростков, как и их родителей в своё время, волнует всё то же: как обратить на себя внимание того, кто тебе нравится? Как отличить увлечение от настоящей любви?\n\nЮношеская мечта о любви – это, что бы ни говорили, прежде всего, мечта о взаимопонимании. Ведь подростку обязательно нужно реализовать себя в общении со сверстниками: проявить свою способность к сочувствию, сопереживанию. Да и просто показать свои качества и способности перед тем, кто настроен к нему доброжелательно, кто готов его понять.\n\nЛюбовь — это безусловное и безграничное доверие двоих друг к другу. Доверие, которое раскрывает в каждом всё то лучшее, на что только способна личность. Настоящая любовь непременно включает в себя дружеские отношения, но не ограничивается ими. Она всегда больше дружбы, поскольку только в любви мы признаем за другим человеком полное право на всё то, что составляет наш мир.",
mt:["Вечность любви","Любовь как понимание","Доверие"]}
]},
{s:"🌱 Природа и экология",c:"c6",tasks:[
{id:"6.01",title:"«Наука, которая занимается охраной природы…»",author:"По Д.С. Лихачёву",
text:"Наука, которая занимается охраной и восстановлением природы, называется экологией. Но экология не может ограничиться только задачами сохранения природной биологической среды. Для жизни человека не менее важна среда, созданная культурой его предков и им самим.\n\nСохранение культурной среды – задача не менее существенная, чем сохранение природы. Если природа необходима человеку для его биологической жизни, то культурная среда столь же необходима для его духовной осёдлости, привязанности к родным местам, нравственной самодисциплины и социализации. А между тем вопрос о нравственной экологии не только не изучается, но и не поставлен нашей наукой как нечто целое и жизненно важное для человека. Изучаются отдельные виды культуры и остатки культурного прошлого, поднимается вопрос реставрации памятников и их сохранения, но не изучается нравственное влияние культурной среды на человека во всём многообразии её взаимосвязей.\n\nЕсли человек не любит хотя бы изредка смотреть на старые фотографии своих родителей, не ценит память о них, значит он не любит их. Если человек не любит старые улицы, старые дома, значит у него нет любви к своему городу. Если человек равнодушен к памятникам истории своей страны, он, как правило, равнодушен и к своей стране.",
mt:["Экология","Культурная среда","Связь с историей"]},
{id:"6.02",title:"«В умении любоваться природой…»",author:"По В.А. Солоухину",
text:"В умении любоваться природой заключается один из секретов постижения красоты. Если человека привести на берег моря, показать ему катящиеся валы прибоя, а через минуту увести от моря подальше, то это одно. Если же человек просидит на берегу несколько часов или проживёт несколько дней, то это совсем другое.\n\nВсе сходятся на том, что на море можно смотреть часами, как на огонь или водопад. Море с его синевой, запахом, грохотом волн, волнующей игрой красок, шуршанием гальки, с необъятным простором, с чайками и облаками наполнит вас, очистит, облагородит, останется в душе навсегда. Но этого не произойдёт, разумеется, если взглянуть и тотчас уйти или наблюдать за этой красотой из окна поезда.\n\nКаждый раз, когда я видел что-нибудь очень красивое в природе: цветущее дерево, цветочную поляну, светлый быстрый ручей, уголок леса с ландышами в еловом сумраке, закатное небо, россыпь брусники вокруг старого пня – у меня появлялось чувство, похожее на досаду, я не знал, что мне делать, как себя вести. Потом я понял: нужно остановиться и смотреть, любоваться, созерцать, исцеляя душу. Надо остановиться перед красотой, не думая о времени, без суеты. Только тогда красота, которой конца и краю нет, пригласит тебя в собеседники. Только тогда возможен с ней глубокий духовный контакт. Только тогда она и принесёт радость.",
mt:["Красота природы","Влияние природы","Созерцание"]},
{id:"6.03",title:"«Когда мне было лет десять…»",author:"По В.М. Пескову",
text:"Когда мне было лет десять, чья-то заботливая рука подложила мне томик «Животные-герои». Я считаю её своим «будильником». От других людей знаю, что для них «будильником» чувства природы были месяц, проведённый летом в деревне, прогулка в лесу с человеком, который «на всё открыл глаза», первое путешествие с рюкзаком, с ночёвкой в лесу...\n\nНет нужды перечислять всё, что может разбудить в человеческом детстве интерес и благоговейное отношение к великому таинству жизни. Вырастая, человек умом постигать должен, как сложно всё в живом мире переплетено, взаимосвязано, как этот мир прочен и вместе с тем уязвим, как всё в нашей жизни зависит от богатства земли, от здоровья живой природы. Эта школа должна обязательно быть.\n\nИ всё-таки в начале всего стоит Любовь. Вовремя разбуженная, она делает познание мира интересным и увлекательным. С нею человек обретает и некую точку опоры, важную точку отсчёта всех ценностей жизни. Любовь ко всему, что зеленеет, дышит, издаёт звуки, сверкает красками, и есть любовь, приближающая человека к счастью.",
mt:["Любовь к природе","Взаимосвязь мира","Познание через любовь"]}
]},
{s:"⚔️ История и память о войне",c:"c7",tasks:[
{id:"7.01",title:"«Война была для детей жестокой школой…»",author:"По Ю. Бондареву",
text:"Война была для детей жестокой и грубой школой. Они сидели не за партами, а в мёрзлых окопах, и перед ними были не тетради, а бронебойные снаряды и пулемётные ленты. Они ещё не обладали жизненным опытом и поэтому не понимали истинной ценности простых вещей, которым не придаёшь значения в повседневной мирной жизни.\n\nВойна наполнила их душевный опыт до предела. Они могли плакать не от горя, а от ненависти, могли по-детски радоваться весеннему журавлиному клину, как никогда не радовались ни до войны, ни после войны, с нежностью хранить в душе тепло ушедшей юности. Те, кто остался в живых, вернулись с войны, сумев сохранить в себе чистый, лучезарный мир, веру и надежду, став непримиримее к несправедливости, добрее к добру.\n\nХотя война и стала уже историей, но память о ней должна жить, ведь главные участники истории — это Люди и Время. Не забывать Время — это значит не забывать Людей, не забывать Людей — это значит не забывать Время.",
mt:["Детство на войне","Влияние войны","Память"]},
{id:"7.02",title:"«Всё дальше уходит Великая Отечественная война…»",author:"По В. Быкову",
text:"Всё дальше уходит Великая Отечественная война в прошлое, но память о ней жива в сердцах и душах людей. В самом деле, как можно забыть наш беспримерный подвиг, наши невосполнимые жертвы, принесённые во имя победы над самым коварным и жестоким врагом немецким фашизмом. Четыре военных года по тяжести пережитого не могут сравниться ни с какими другими годами нашей истории.\n\nНо память человека со временем ослабевает, из неё по крупицам уходит сначала второстепенное, менее значимое и яркое, а затем и существенное. К тому же все меньше становится ветеранов, тех, кто прошёл войну и мог бы рассказать о ней. Если в документах и произведениях искусства не будут отражены самопожертвование и стойкость народа, то горький опыт прошлых лет забудется. А этого нельзя допустить.\n\nТема Великой Отечественной войны на протяжении десятилетий питает нашу литературу и искусство. О жизни человека на войне снято немало прекрасных фильмов, созданы замечательные произведения литературы. И тут нет какой-либо преднамеренности, есть боль, не покидающая душу народа, который потерял за годы войны миллионы человеческих жизней. Но самым главным в разговоре на эту тему является сохранение меры и такта в отношении к правде войны, к ее участникам - живым, но главным образом, погибшим.",
mt:["Историческая память","Опасность забвения","Роль искусства"]}
]},
{s:"❤️ Нравственные ценности",c:"c8",tasks:[
{id:"8.01",title:"«В чем самая большая цель жизни?»",author:"По Д.С. Лихачёву",
text:"В чем самая большая цель жизни? Я думаю, в том, чтобы увеличивать добро в окружающем нас мире. А добро – это прежде всего счастье всех людей. Ребёнок любит мать и отца, братьев и сестёр, свой дом. Постепенно расширяясь, его привязанности распространяются на школу, село, город, всю страну. А это уже большое и глубокое чувство.\n\nНадо быть патриотом, но не националистом. Нет необходимости ненавидеть каждую чужую семью, потому что любишь свою. Нет необходимости ненавидеть другие народы, потому что ты патриот. Между патриотизмом и национализмом глубокое различие. В первом заключается любовь к своей стране, во втором – ненависть ко всем другим.\n\nБольшая цель добра начинается с малого – с желания добра своим близким, но, расширяясь, она захватывает всё более широкий круг вопросов. Любовь к людям не должна быть безотчётной – она должна быть умной, должна соединяться с умением замечать недостатки как в окружающих людях, так и в себе, бороться с ними. Любовь должна быть соединена с мудростью. Мудрость – это ум, соединённый с добротой. Ум без доброты – хитрость, которая рано или поздно оборачивается против самого хитреца. Мудрость же приносит человеку доброе имя, прочное счастье и ту спокойную совесть, которая ценнее всего.",
mt:["Смысл жизни","Патриотизм","Доброта и мудрость"]},
{id:"8.02",title:"«Самое хорошее поведение…»",author:"По Д.С. Лихачёву",
text:"Самое хорошее поведение то, которое определяется не внешними рекомендациями, а душевной необходимостью. Душевная же необходимость, пожалуй, особенно хороша, когда безотчётна. Поступать надо правильно, не думая, не размышляя долго. Безотчётная душевная необходимость поступать хорошо, делать людям добро – самое ценное в человеке. Но душевная потребность эта не всегда присуща человеку от рождения. Она воспитывается в основном им же самим, его решимостью жить по правде, по-доброму.\n\nМы учимся ездить на велосипеде и сперва следуем определённым несложным советам друзей и взрослых: поворачивать руль в ту сторону, в которую падаешь. А вскоре ездим, уже не думая ни о каких правилах, и ездим уже хорошо и свободно всю жизнь. В жизни тоже есть свои правила: надо жить честно, по правде. Когда вы только учитесь ездить на велосипеде, когда думаете, куда повернуть, вы затрачиваете множество усилий. А когда научились и не думаете, вы уже неутомимы.\n\nЕсли вы научитесь быстро и ответственно принимать правильные решения, жить будет легко. Стремитесь ходить путями добра так же просто и безотчётно, как вы дышите. Тропинки и дорожки нашего прекрасного сада, который зовётся окружающим миром, легки, удобны, встречи на них особенно интересны, если только исходные данные выбраны вами правильно.",
mt:["Нравственное поведение","Привычка к добру","Жизненные принципы"]},
{id:"8.03",title:"«Чтобы оценить доброту…»",author:"По И.А. Ильину",
text:"Чтобы оценить доброту и понять её значение, надо непременно самому испытать её: надо воспринять луч чужой доброты и пожить в нем. Надо почувствовать, как луч этой доброты овладевает сердцем, словом и делами всей жизни. Доброта приходит не по обязанности, не в силу долга, а как дар.\n\nЧужая доброта – это предчувствие чего-то большего, во что даже не сразу верится; это теплота, от которой сердце согревается и приходит в ответное движение. Человек, раз испытавший доброту, не может не ответить (рано или поздно, уверенно или неуверенно) своей добротой.\n\nЭто великое счастье – почувствовать в своём сердце огонь доброты и дать ему волю в жизни. В этот миг человек находит в себе всё лучшее, слышит пение своего сердца. Забывается «я» и своё, исчезает чужое, ибо оно становится «моим» и «мною». И для вражды и ненависти не остаётся места в душе. Сердце, живущее добротой, излучает в мир свой ласковый взор, творческое начало.\n\nДобрая душа открыта миру. Когда мы смотрим в глаза истинно доброму человеку, мы видим струящийся из них свет, сочувствующий и согревающий. В них нет подозрительности, нет жёсткости – в них ласковое сияние как бы из окна родного дома. Это утешает, успокаивает и облегчает душу.",
mt:["Опыт доброты","Влияние на человека","Значение доброты"]},
{id:"8.04",title:"«Я вспоминал сотни ответов мальчишек…»",author:"По В.А. Сухомлинскому",
text:"Я вспоминаю сотни ответов мальчишек на вопрос: каким человеком тебе хочется стать. Сильным, храбрым, мужественным, умным, находчивым, бесстрашным…, и никто не сказал – добрым. Почему доброта не ставится в один ряд с такими доблестями, как мужество и храбрость?\n\nНо ведь без доброты, подлинной теплоты сердца, невозможна душевная красота человека. И опыт подтверждает, что добрые чувства должны уходить своими корнями в детство. Если они не воспитаны в детстве, их никогда не воспитаешь, потому что они усваиваются одновременно с познанием первых и важнейших истин, главная из которых – это ценность жизни, чужой, своей, жизни животного мира и растений. Человечность, доброта, доброжелательность рождаются в заботах, волнениях, радостях и печалях.\n\nДобрые чувства, эмоциональная культура – это средоточие человечности.\n\nСегодня, когда в мире и так достаточно зла, нам стоит быть более терпимыми, внимательными и добрыми по отношению друг к другу, по отношению к окружающему живому миру и совершать самые смелые поступки во имя добра. Следование путём добра – путь самый приемлемый и единственный для человека. Он испытан, он верен, он полезен и человеку в одиночку, и всему обществу в целом.",
mt:["Недооценка доброты","Воспитание чувств","Роль доброты"]},
{id:"8.05",title:"«В обществе, где культивируется индивидуализм…»",author:"По материалам Интернета",
text:"В обществе, где культивируется идея индивидуализма, многие забыли о таких вещах как взаимовыручка и взаимопомощь. Человеческое общество как раз сформировалось и продолжает существовать, благодаря общему делу и помощи слабым благодаря тому, что каждый из нас дополняет друг друга. И как теперь мы можем поддерживать совершенно противоположную точку зрения, гласящую о том, что нет иных интересов, кроме наших собственных?\n\nИ дело тут даже не в том, что это звучит эгоистично, дело в том, что именно в этом вопросе переплетаются личные и общественные интересы. Понимаете, насколько это глубже, чем кажется, ведь индивидуализм разрушает общество, а стало быть, и ослабляет каждого из нас. И только взаимная поддержка может сохранить и укрепить общество.\n\nИ что же больше отвечает нашим общим интересам: взаимная выручка или примитивный эгоизм? Здесь двух мнений быть не может. Мы должны помогать друг другу, если хотим все вместе жить хорошо и ни от кого не зависеть. И помогая людям в трудную минуту не надо ждать благодарности, надо просто помогать, не ища для себя выгоды, и тогда и тебе в ответ помогут, обязательно.",
mt:["Индивидуализм","Взаимопомощь","Общество"]},
{id:"8.06",title:"«Что значит быть культурным человеком?»",author:"По материалам Интернета",
text:"Что значит быть культурным человеком? Культурным можно считать человека образованного, воспитанного, ответственного. Он уважает себя и окружающих. Культурного человека отличает также творческий труд, стремление к высокому, умение быть благодарным, любовь к природе и Родине, сострадание и сочувствие к ближнему, доброжелательство.\n\nКультурный человек никогда не солжёт, он сохранит самообладание и достоинства в любых жизненных ситуациях. Он имеет чётко поставленную цель и добивается ею. Главная же цель такого человека увеличивать добро в мире, стремиться к тому, чтобы все люди были счастливы. Идеалом культурного человека является подлинная человечность.\n\nВ наше время люди уделяют слишком мало внимания культуре, а многие даже не задумываются об этом на протяжении всей жизни. Хорошо, если у человека процесс приобщения к культуре происходит с детства. Ребёнок знакомится с традициями, переходящими из поколения в поколение, впитывает положительный опыт семьи и своей Родины, познаёт культурные ценности. Став взрослым, он сможет быть полезным обществу.",
mt:["Культурный человек","Качества личности","Роль культуры"]},
{id:"8.07",title:"«Лучше всего проявляет свою воспитанность…»",author:"По Д.С. Лихачёву",
text:"Лучше всего проявляет свою воспитанность человек, когда он ведёт дискуссию, спорит, отстаивая свои убеждения. В споре сразу же обнаруживается интеллигентность, логичность мышления, вежливость, умение уважать людей и самоуважение.\n\nКак же ведёт спор умный и вежливый спорщик? Прежде всего внимательно выслушивает своего противника – человека, который не согласен с его мнением. Если что-либо неясно в позиции противника, он задаёт ему дополнительные вопросы, переспрашивает. Если вы с самого начала ведёте спор вежливо и спокойно, без заносчивости, то тем самым вы обеспечиваете себе спокойное отступление с достоинством.\n\nНет ничего красивее в споре, чем в случае необходимости признать полную или частичную правоту оппонента. Этим вы завоёвываете уважение окружающих, этим вы как бы призываете к уступчивости и своего противника, заставляете его смягчить крайности своей позиции. Но человек не должен уступать оппоненту только для того, чтобы ему понравиться, или из трусости, из карьерных соображений. Нужно уступать с достоинством в вопросе, который не заставляет вас отказаться от своих убеждений, или с достоинством принять свою победу, не злорадствуя над побеждённом в споре, не оскорбляя его самолюбия.\n\nОдно из самых больших интеллектуальных удовольствий – следить за спором, который ведётся умелыми и умными противниками.",
mt:["Поведение в споре","Умение слушать","Уважение"]},
{id:"8.08",title:"«У Чехова была удивительная особенность…»",author:"По М. Горькому",
text:"У Чехова была удивительная особенность: каждый человек при нём невольно ощущал в себе желание быть проще, правдивее, быть самим собой. Люди сбрасывали с себя пёстрые наряды книжных фраз и модных слов, которыми человек, желая казаться солиднее, украшает себя. Антон Павлович этого не любил. Всё пёстрое, гремящее и чужое вызывало в нём смущение. Каждый раз, когда он видел перед собой такого человека, им овладевало желание освободить его от этой мишуры, искажавшей настоящее лицо и живую душу собеседника.\n\nВсю жизнь Чехов был самим собой, был внутренне свободен и никогда не считался с тем, чего одни от него ожидали, другие – требовали. Он не любил разговоров на «высокие» темы. Он любил всё простое, настоящее, искреннее.\n\nОднажды писателя посетили три пышно одетые дамы. Чинно усевшись вокруг хозяина, они притворились, будто бы их очень интересует политика, и стали задавать Чехову умные вопросы. «Как вы думаете, чем кончится война?» – спросили они. «Вероятно, миром», – немного подумав, ответил Чехов. «А кого вы больше любите: греков или турок?» – не унимались дамы. Антон Павлович с улыбкой ответил: «Я люблю мармелад, а вы любите?» С этого момента все трое оживлённо заговорили, обнаруживая в вопросе о мармеладе прекрасное знание предмета. Было очевидно: они очень довольны тем, что не нужно притворяться, а уходя, пообещали Чехову прислать мармелад.",
mt:["Искренность","Простота","Влияние личности"]},
{id:"8.09",title:"«Почему многие испытывают чувство одиночества…»",author:"По С.Л. Соловейчику",
text:"Почему многие испытывают чувство одиночества? Вокруг полно народу, но никто тебя не хочет выслушать, никому ты не интересен, каждый занят собой. А если и слышат тебя, то не понимают. Очень многие молодые люди жалуются на то, что их не понимают родители: «Шестнадцать лет под одной крышей живём, а никак не можем найти общий язык!»\n\nОбщий язык! Оказывается, это такая редкость! Оказывается, даже родной язык может быть непонятен! Почему так получается? Да потому что за каждым нашим словом кроется какое-то желание, чувство, какой-то интерес. Все слова понятны, но мы не хотим пониматься чужие чувства, интересы, желания, не хотим растрачивать на это свои душевные силы. Мы ленимся, боимся впустить в свою душу другого. Оттого мы так редко смотрим в глаза друг другу. Спросил на ходу: «Как дела?» – и, не дождавшись ответа или удовлетворившись пустыми словами, бежим дальше: «Привет! Как дела? И у меня ничего».\n\nИ лишь редко-редко встречается на жизненном пути человек, который слушает и понимает. Исключительное качество! Изумительное достоинство! Но зато такое достоинство, которое доступно каждому. Не всякий талантлив, не все красивы, не каждый и умён. Но для того, чтобы слушать и понимать человека, не нужно ни особого ума, ни особых талантов – надо только внимательно слушать и стараться понять.",
mt:["Одиночество","Непонимание","Умение слушать"]}
]},
{s:"🧠 Личность и саморазвитие",c:"c9",tasks:[
{id:"9.01",title:"«Многие думают, что быть искренним…»",author:"",
text:"Многие думают, что быть искренним – значит открыто и прямо говорить то, что думаешь и делать то, что говоришь. Но вот незадача: человек, сразу озвучивающий то, что первое взбрело ему в голову, рискует прослыть не только естественным, но и невоспитанным, а то и глупым. Скорее искренний и естественный человек – тот, кто умеет быть самим собой, снять маски, выйти из привычных ролей и показать своё истинное лицо.\n\nГлавная проблема в том, что мы плохо знаем себя, гонимся за призрачными целями, деньгами, модой. Мало кто считает важными и нужным направить вектор внимания в свой внутренний мир. Нужно заглянуть в своё сердце, остановиться и проанализировать свои мысли, желания и планы, чтобы понять, что истинно моё, а что навязанное, продиктованное друзьями, родителями, обществом. Иначе ты рискуешь всю жизнь тратить силы на цели, которые тебе на самом деле вовсе не нужны.\n\nЕсли ты заглянешь в себя, то увидишь целый мир, бесконечный и многогранный. Ты обнаружишь свои особенности и таланты. Надо только изучать. И тебе, конечно же, не станет легче и проще, но станет интереснее. Ты найдёшь свой жизненный путь. Единственный способ стать искренним – это познавать себя.",
mt:["Искренность","Самопознание","Жизненный путь"]},
{id:"9.02",title:"«Неуверенность в себе…»",author:"По материалам Интернета",
text:"Неуверенность в себе - проблема древняя, однако она привлекла внимание медиков, педагогов и психологов сравнительно недавно - в середине XX века. Именно тогда стало понятно: всё усиливающаяся неуверенность в себе может стать причиной массы неприятностей - вплоть до серьёзных заболеваний, не говоря уже о житейских проблемах.\n\nА проблемы психологические? Ведь неуверенность в себе может послужить почвой постоянной зависимости от чужого мнения. Представим себе, как неудобно чувствует себя зависимый: чужие оценки кажутся ему гораздо более важными и значимыми, чем собственные; каждый свой поступок он видит прежде всего глазами окружающих. А главное, ему хочется одобрения ото всех, начиная с близких и заканчивая пассажирами в трамвае. Такой человек становится нерешительным и не может правильно оценить жизненные ситуации.\n\nКак же преодолеть неуверенность в себе? Одни учёные ищут ответ на этот вопрос, основываясь на физиологических процессах, другие опираются на психологию. Ясно одно: преодолеть неуверенность в себе можно лишь в случае, если человек способен правильно ставить цели, соотносить их с внешними обстоятельствами и позитивно оценивать свои результаты.",
mt:["Неуверенность","Зависимость от мнения","Преодоление"]},
{id:"9.03",title:"«Некоторые считают, что человек взрослеет…»",author:"По М. Шигаповой",
text:"Некоторые считают, что человек взрослеет в каком-нибудь определённом возрасте. Например, в 18 лет, когда он становится совершеннолетним. Но есть люди, которые и в более старшем возрасте остаются детьми. Что же значит быть взрослым?\n\nВзрослость означает самостоятельность, то есть это умение обходиться без чьей-либо помощи, опеки. Человек, обладающий этим качеством, все делает сам и не ждёт поддержки от других. Он понимает, что свои трудности должен преодолевать сам. Конечно, бывают ситуации, когда человеку одному не справиться. Тогда приходится просить помощи у друзей, родственников и знакомых. Но в целом самостоятельному, взрослому человеку не свойственно надеяться на других. Есть такое выражение: руке следует ждать помощи только от плеча.\n\nСамостоятельный человек умеет отвечать за себя, за свои дела и поступки. Он сам планирует свою жизнь и оценивает себя, не полагаясь на чьё-то мнение. Он понимает, что многое в жизни зависит от него самого. Быть взрослым значит отвечать за кого-то ещё. Но для этого тоже надо стать самостоятельным, уметь принимать решения. Взрослость зависит не от возраста, а от жизненного опыта, от стремления прожить жизнь без нянек.",
mt:["Взрослость","Самостоятельность","Ответственность"]},
{id:"9.04",title:"«Универсального рецепта выбора пути…»",author:"По А.Н. Москвину",
text:"Универсального рецепта того, как выбрать правильный, единственно верный, только тебе предназначенный путь в жизни, просто нет и быть не может. И окончательный выбор всегда остаётся за человеком.\n\nЭтот выбор мы делаем уже в детстве, когда выбираем друзей, учимся строить отношения с ровесниками, играть. Но большинство важнейших решений, определяющих жизненный путь, мы всё-таки принимаем в юности. Как считают учёные, вторая половина второго десятилетия жизни – самый ответственный период. Именно в это время человек, как правило, выбирает самое главное и на всю жизнь: ближайшего друга, круг основных интересов, профессию.\n\nПонятно, что такой выбор – дело ответственное. От него невозможно отмахнуться, его нельзя отложить на потом. Не стоит надеяться, что ошибку после можно будет исправить: успеется, вся жизнь впереди! Что-то, конечно, удастся подправить, изменить, но далеко не всё. И неверные решения без последствий не останутся. Ведь успех приходит к тем, кто знает, чего он хочет, решительно делает выбор, верит в себя и упорно достигает намеченных целей.",
mt:["Выбор пути","Роль юности","Ответственность"]},
{id:"9.05",title:"«Каждый человек ищет место в жизни…»",author:"По М.С. Крюкову",
text:"Каждый человек ищет место в жизни. Старается утвердить своё «я». Это естественно. Только вот как он находит своё место, какими путями идёт к нему, какие моральные ценности имеют вес в его глазах, – вопрос чрезвычайно важный.\n\nМногие из нас не могут признаться в себе в том, что из-за ложно понятого, раздутого чувства собственного достоинства, из-за нежелания показаться хуже мы иногда делаем опрометчивые шаги, поступаем не очень правильно: лишний раз не переспросим, не скажем «не знаю, не могу». Слов нет, себялюбцы вызывают чувство осуждения. Однако не лучше и те, кто разменивает свое достоинство, как мелкую монету. В жизни каждого человека, наверное, бывают моменты, когда он просто обязан проявить своё самолюбие, утвердить своё «я». И, конечно, сделать это не всегда просто.\n\nИстинная цена человека рано или поздно все равно обнаруживается. И тем выше эта цена, чем больше человек любит не столько себя, сколько других. Лев Толстой подчёркивал, что каждый из нас, так называемый маленький, рядовой человек, на самом деле есть лицо историческое, которое несёт ответственность за судьбу всего мира.",
mt:["Поиск себя","Самооценка","Ценность личности"]},
{id:"9.06",title:"«В детстве человек счастлив…»",author:"По О. Рою",
text:"В детстве человек счастлив, как сейчас говорят, по умолчанию. По природе своей ребёнок – существо, инстинктивно предрасположенное к счастью. Какой бы трудной и даже трагичной ни была его жизнь, он всё равно радуется и постоянно находит для этого все новые и новые поводы. Возможно, потому что ему пока не с чем сравнить свою жизнь, он ещё не подозревает, что может быть как-то иначе. Но, скорее всего, всё-таки потому, что детская душа ещё не успела покрыться защитным панцирем и более открыта добру и надеждам, чем душа взрослого человека.\n\nА с возрастом всё словно бы выворачивается наизнанку. Как бы спокойно и благополучно ни складывалась наша жизнь, мы не успокоимся, пока не найдём в ней некую занозу, нескладицу, неполадку, прицепимся к ней, и почувствуем себя глубоко несчастными. И мы верим в придуманную нами драму, искренне жалуемся на неё друзьям, тратим на переживания время, здоровье, душевные силы…\n\nЛишь когда случается действительно настоящая трагедия, мы понимаем, сколь нелепы выдуманные страдания и сколь пустячен повод для них. Тогда мы хватаемся за голову и говорим себе: «Господи, каким же я был глупцом, когда страдал из-за какой-то ерунды. Нет чтобы жить в своё удовольствие и наслаждаться каждой минутой».",
mt:["Детство","Изменение восприятия","Ценности жизни"]},
{id:"9.07",title:"«У каждого из нас были любимые игрушки…»",author:"",
text:"У каждого из нас когда-то были любимые игрушки. Пожалуй, у каждого человека есть связанное с ними светлое и нежное воспоминание, которое он бережно хранит в своём сердце. Любимая игрушка – это самое яркое воспоминание из детства каждого человека.\n\nВ век компьютерных технологий реальные игрушки уже не привлекают к себе такого внимания, как виртуальные. Но несмотря на все появляющиеся новинки, такие как телефоны и компьютерная техника, игрушка всё-таки остаётся неповторимой и незаменимой в своём роде, ведь ничто так не учит и не развивает ребёнка, как игрушка, с которой он может общаться, играть и даже приобретать жизненный опыт.\n\nИгрушка – это ключ к сознанию маленького человека. Чтобы развить и укрепить в нем положительные качества, сделать его психически здоровым, привить любовь к окружающим, сформировать правильное понимание добра и зла, необходимо тщательно выбирать игрушку, помня, что она принесёт в его мир не только свой образ, но и поведение, атрибуты, а также систему ценностей и мировоззрение. Невозможно воспитать полноценного человека с помощью игрушек негативной направленности.",
mt:["Игрушка","Развитие ребёнка","Формирование личности"]},
{id:"9.08",title:"«Для чего пишутся сказки?»",author:"По Ю.Б. Норштейну",
text:"Для чего пишутся сказки? Ответов много: для заветных мечтаний, для забавы, для того чтобы с помощью сказки открыть мир, для того чтобы порадовать близкого тебе человека. Сказка делает мир живым. В ней разговаривают звери, деревья, травы, солнце, луна. Одни звери наглые, другие трусливые, третьи сильные, готовые прийти к тебе на помощь – у них храброе сердце. Сказка учит быть добрым и помогать слабому, учит сочувствию и юмору. Сказка открывает в тебе воображение. Его отсутствие может стать бедствием для людей и даже для страны: человек без воображения не способен понять чужую боль.\n\nНо сказка и о торжестве справедливости, потому что маленький человек, которому читают сказку, должен быть твёрдо уверен: правда на земле существует. Если в раннем детстве ребёнок переживает несправедливость и остаётся с этим чувством наедине, без помощи, то скрыться от этой несправедливости ему некуда, и тогда он живёт с ощущением враждебности мира. Сказка со справедливым финалом снимает эту тяжесть. Она создаёт в детской душе равновесие, поселяет радость.\n\nВзрослея, ребёнок начинает постигать сложные истины, учиться жизни. И первая ступень к этому – сказка. Главное, чтобы взрослеющего человека не покидала вера в чудо. Тогда мир будет постоянно открываться для него новыми гранями.",
mt:["Назначение сказки","Воспитание","Воображение"]}
]}
];

// ====== STATE ======
var curSec=0, curTask=0, done=new Set(), texts={};
var totalTasks=0;
var aiChecking=false;

function load(){try{var s=localStorage.getItem('oge_st');if(s){var j=JSON.parse(s);done=new Set(j.d||[]);texts=j.t||{}};}catch(e){}}
function save(){try{localStorage.setItem('oge_st',JSON.stringify({d:[...done],t:texts}));}catch(e){}}
function countW(t){if(!t||!t.trim())return 0;return t.trim().split(/\s+/).filter(function(w){return w.length>0;}).length;}

// ====== ЯНДЕКС.СПЕЛЛЕР ======
function aiSpellCheck(text, callback){
  var xhr=new XMLHttpRequest();
  var url='https://speller.yandex.net/services/spellservice.json/checkText?text='+encodeURIComponent(text)+'&lang=ru';
  xhr.open('GET',url,true);
  xhr.timeout=8000;
  xhr.onload=function(){
    if(xhr.status===200){try{callback(null,JSON.parse(xhr.responseText));}catch(e){callback(e,null);}}
    else{callback(new Error('HTTP '+xhr.status),null);}
  };
  xhr.onerror=function(){callback(new Error('Нет соединения с интернетом'),null);};
  xhr.ontimeout=function(){callback(new Error('Превышено время ожидания'),null);};
  xhr.send();
}

// ====== ОЦЕНИВАНИЕ ======
function evaluate(tid){
  var sec=DATA[curSec];
  var task=sec.tasks[curTask];
  var txt=texts[tid]||'';
  var wc=countW(txt);
  var srcWc=countW(task.text);
  var result={k1:{score:0,max:2,items:[]},k2:{score:0,max:2,items:[]},k3:{score:0,max:2,items:[]},k4:{score:0,max:0,items:[],aiChecked:false}};

  // === K1: Содержание (макс 2) ===
  if(wc<70){
    result.k1.items.push({type:'err',text:'Объём менее 70 слов — изложение не проверяется'});
  } else {
    var paras=txt.split(/\n\s*\n/).filter(function(p){return p.trim().length>0;});
    var mtsFound=0;
    task.mt.forEach(function(mt,i){
      var words=mt.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});
      var found=words.some(function(w){
        return txt.toLowerCase().indexOf(w)>=0;
      });
      if(found){
        mtsFound++;
        result.k1.items.push({type:'ok',text:'Микротема '+((i+1))+': «'+mt+'» — передана ✓'});
      } else {
        result.k1.items.push({type:'warn',text:'Микротема '+((i+1))+': «'+mt+'» — не обнаружена'});
      }
    });
    if(mtsFound>=3)result.k1.score=2;
    else if(mtsFound>=2)result.k1.score=1;
    else if(mtsFound>=1)result.k1.score=0;
  }

  // === K2: Сжатие (макс 2) ===
  if(wc<70){
    result.k2.items.push({type:'err',text:'Объём менее 70 слов'});
  } else {
    var ratio=wc/srcWc;
    if(ratio<=0.5){
      result.k2.score=0;
      result.k2.items.push({type:'warn',text:'Текст слишком сильно сжат ('+Math.round(ratio*100)+'% от оригинала)'});
    } else if(ratio<=0.75){
      result.k2.score=2;
      result.k2.items.push({type:'ok',text:'Отличное сжатие ('+Math.round(ratio*100)+'%) ✓'});
    } else if(ratio<=0.9){
      result.k2.score=1;
      result.k2.items.push({type:'warn',text:'Можно сжать сильнее ('+Math.round(ratio*100)+'%)'});
    } else {
      result.k2.score=0;
      result.k2.items.push({type:'err',text:'Текст почти не сжат ('+Math.round(ratio*100)+'%)'});
    }
    if(wc>=70&&wc<150){
      result.k2.items.push({type:'ok',text:'Объём '+wc+' слов — в пределах нормы ✓'});
    }
  }

  // === K3: Логичность (макс 2) ===
  if(wc<70){
    result.k3.items.push({type:'err',text:'Объём менее 70 слов'});
  } else {
    var paras=txt.split(/\n\s*\n/).filter(function(p){return p.trim().length>0;});
    if(paras.length>=3){
      result.k3.score=Math.min(result.k3.score+1,2);
      result.k3.items.push({type:'ok',text:'Текст разделён на '+paras.length+' абзаца ✓'});
    } else if(paras.length===2){
      result.k3.items.push({type:'warn',text:'Рекомендуется 3 абзаца (найдено '+paras.length+')'});
    } else {
      result.k3.items.push({type:'err',text:'Текст не разделён на абзацы'});
    }

    var connectors=['однако','кроме того','поэтому','таким образом','во-первых','во-вторых','в-третьих','кроме','также','ещё','значит','следовательно','итак','наконец','к тому же','кроме этого','кроме того','помимо этого','в заключение','в итоге','в результате','в связи с этим','в то же время','кроме','кроме того','помимо','а также','ещё','кроме'];
    var connCount=0;
    connectors.forEach(function(c){
      if(txt.toLowerCase().indexOf(c)>=0)connCount++;
    });
    if(connCount>=2){
      result.k3.score=Math.min(result.k3.score+1,2);
      result.k3.items.push({type:'ok',text:'Есть средства связи между частями ('+connCount+') ✓'});
    } else if(connCount===1){
      result.k3.items.push({type:'warn',text:'Мало средств связи между частями'});
    } else {
