      result.k3.items.push({type:'err',text:'Нет средств связи между частями текста'});
    }
  }

  return result;
}

// ====== INIT ======
function init(){
  load();
  DATA.forEach(function(sec){totalTasks+=sec.tasks.length;});
  mkBg();mkSecNav();goSec(0);
}

function mkBg(){
  var c=document.getElementById('bgAnim');
  var clouds=['☁️','☁️','⛅'],stars=['⭐','🌟','✨'],flowers=['🌸','🌺','🌻','🌷','🌼'];
  for(var i=0;i<5;i++){var e=document.createElement('div');e.className='cloud';e.textContent=clouds[i%3];e.style.top=(Math.random()*35)+'%';e.style.animationDuration=(25+Math.random()*25)+'s';e.style.animationDelay=(-Math.random()*30)+'s';c.appendChild(e);}
  for(var i=0;i<8;i++){var e=document.createElement('div');e.className='star';e.textContent=stars[i%3];e.style.top=(Math.random()*100)+'%';e.style.left=(Math.random()*100)+'%';e.style.animationDelay=(Math.random()*3)+'s';c.appendChild(e);}
  for(var i=0;i<6;i++){var e=document.createElement('div');e.className='flower';e.textContent=flowers[i%5];e.style.top=(72+Math.random()*23)+'%';e.style.left=(Math.random()*100)+'%';e.style.animationDelay=(Math.random()*4)+'s';c.appendChild(e);}
}

function mkSecNav(){
  var n=document.getElementById('secNav');n.innerHTML='';
  DATA.forEach(function(sec,i){
    var b=document.createElement('button');b.className='sec-btn '+sec.c+(i===curSec?' active':'');b.textContent=sec.s;b.onclick=function(){goSec(i);};n.appendChild(b);
  });
}

function goSec(i){curSec=i;curTask=0;mkSecNav();mkTaskNav();render();}

function mkTaskNav(){
  var n=document.getElementById('taskNav');n.innerHTML='';
  var sec=DATA[curSec];
  sec.tasks.forEach(function(t,i){
    var b=document.createElement('button');b.className='task-btn'+(i===curTask?' active':'')+(done.has(t.id)?' done':'');b.textContent=t.id;b.onclick=function(){curTask=i;mkTaskNav();render();};n.appendChild(b);
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function render(){
  var sec=DATA[curSec],task=sec.tasks[curTask];
  var m=document.getElementById('main');
  var txt=texts[task.id]||'';
  var wc=countW(txt);
  var cc=wc>=70?'wc-green':wc>=55?'wc-orange':'wc-red';
  var ci=wc>=70?'✅':wc>=55?'⚠️':'🔴';
  var cm=wc>=70?'Объём достаточный!':wc>=55?'Почти достаточно':'Нужно минимум 70 слов!';

  var mtHtml='';task.mt.forEach(function(mt,j){mtHtml+='<li><strong>'+((j+1))+'</strong>. '+mt+'</li>';});

  var h='';
  h+='<div class="card">';
  h+='<h2>'+sec.s+' — Задание '+task.id+'</h2>';
  h+='<h3>'+task.title+'</h3>';

  h+='<div class="audio-box"><span class="audio-ico">🎧</span>';
  h+='<audio controls preload="metadata"><source src="'+task.id+'.mp3" type="audio/mpeg">Ваш браузер не поддерживает аудио.</audio></div>';

  h+='<button class="text-toggle" onclick="togSrc(this)">📖 Показать исходный текст</button>';
  h+='<div class="source-text" style="display:none;">'+escHtml(task.text)+(task.author?'<span class="author">'+task.author+'</span>':'')+'</div>';

  h+='<button class="hints-btn" onclick="togHints(this)">💡 Подсказки (микротемы)</button>';
  h+='<div class="hints-panel"><h4>📋 Микротемы для изложения:</h4><ul>'+mtHtml+'</ul>';
  h+='<p style="margin-top:8px;font-size:0.85em;color:#888;">💡 <em>Постарайтесь отразить все три микротемы, используя приёмы сжатия.</em></p></div>';

  h+='<div class="criteria-info"><h4>📝 Критерии оценивания (макс. 7 баллов):</h4>';
  h+='<div class="cr-row"><span class="cr-badge">K1</span><span><strong>Содержание</strong> (2 балла) — все 3 микротемы</span></div>';
  h+='<div class="cr-row"><span class="cr-badge">K2</span><span><strong>Сжатие</strong> (2 балла) — приёмы сжатия</span></div>';
  h+='<div class="cr-row"><span class="cr-badge">K3</span><span><strong>Логичность</strong> (2 балла) — последовательность и абзацы</span></div>';
  h+='<div class="cr-row"><span class="cr-badge">K4</span><span><strong>Грамотность</strong> (по ошибкам) — орфография + пунктуация</span></div>';
  h+='<p style="margin-top:6px;font-size:0.82em;color:#888;">⚠️ Менее 70 слов = 0 баллов!</p></div>';

  h+='<h3>✍️ Напишите изложение:</h3>';
  h+='<textarea class="writing-area" id="wArea" spellcheck="true" oninput="onInput(\''+task.id+'\')" placeholder="Пишите изложение здесь...">'+escHtml(txt)+'</textarea>';

  h+='<div class="word-counter '+cc+'" id="wcBox"><span>'+ci+'</span><span id="wcText">Слов: '+wc+' | '+cm+'</span></div>';
  h+='<div class="char-info">Символов: <span id="cc1">'+txt.length+'</span> | Без пробелов: <span id="cc2">'+txt.replace(/\s/g,'').length+'</span></div>';

  h+='<div style="text-align:center;margin-top:16px;">';
  h+='<button class="btn btn-eval" onclick="doEvaluate(\''+task.id+'\')">📊 Оценить изложение</button> ';
  h+='<button class="btn btn-ai" id="aiBtn" onclick="doAiCheck(\''+task.id+'\')">🤖 ИИ-проверка орфографии</button> ';
  h+='<button class="btn btn-ok" onclick="markDone(\''+task.id+'\')">✅ Выполнено</button> ';
  h+='<button class="btn btn-del" onclick="clearText(\''+task.id+'\')">🗑️ Очистить</button> ';
  h+='<button class="btn btn-copy" onclick="doCopy()">📋 Копировать</button>';
  h+='</div>';

  h+='<div id="resultsPanel"></div>';
  h+='<div id="aiResults" class="ai-section"></div>';

  h+='<div class="nav-row">';
  h+='<button class="btn btn-primary" onclick="goPrev()"'+(curTask===0?' style="opacity:0.4;cursor:not-allowed;"':'')+'>⬅️ Назад</button>';
  h+='<button class="btn btn-primary" onclick="goNext()"'+(curTask===sec.tasks.length-1?' style="opacity:0.4;cursor:not-allowed;"':'')+'>Вперёд ➡️</button>';
  h+='</div>';

  h+='</div>';
  m.innerHTML=h;
  updProg();
}

function onInput(tid){
  var ta=document.getElementById('wArea');
  var txt=ta.value;
  texts[tid]=txt;save();
  var wc=countW(txt);
  var cc=wc>=70?'wc-green':wc>=55?'wc-orange':'wc-red';
  var ci=wc>=70?'✅':wc>=55?'⚠️':'🔴';
  var cm=wc>=70?'Объём достаточный!':wc>=55?'Почти достаточно':'Нужно минимум 70 слов!';
  document.getElementById('wcBox').className='word-counter '+cc;
  document.getElementById('wcText').innerHTML='Слов: '+wc+' | '+cm;
  document.getElementById('cc1').textContent=txt.length;
  document.getElementById('cc2').textContent=txt.replace(/\s/g,'').length;
}

// ====== ОЦЕНИВАНИЕ ======
function doEvaluate(tid){
  var txt=texts[tid]||'';
  var wc=countW(txt);
  if(wc<1){alert('Сначала напишите изложение!');return;}

  var r=evaluate(tid);
  var panel=document.getElementById('resultsPanel');

  var total=r.k1.score+r.k2.score+r.k3.score;

  var gradeLabel,gradeClass;
  if(total>=6){gradeLabel='🏆 Отлично!';gradeClass='grade-excellent';}
  else if(total>=4){gradeLabel='👍 Хорошо';gradeClass='grade-good';}
  else if(total>=2){gradeLabel='⚠️ Нужно доработать';gradeClass='grade-average';}
  else{gradeLabel='❌ Неудовлетворительно';gradeClass='grade-poor';}

  function renderCriteria(key,label,maxScore){
    var cr=r[key];
    var sc=cr.score;
    var scClass=sc===maxScore?'s2':sc===1?'s1':'s0';
    var items=cr.items.map(function(it){
      var icon=it.type==='ok'?'✓':it.type==='warn'?'⚠':'✗';
      var cls=it.type==='ok'?'ok':it.type==='warn'?'warn':'err';
      return '<li><span class="icon '+cls+'">'+icon+'</span><span>'+escHtml(it.text)+'</span></li>';
    }).join('');
    return '<div class="criteria-card"><div class="cr-header"><span class="cr-label">'+label+'</span><span class="cr-score '+scClass+'">'+sc+'/'+maxScore+'</span></div><ul class="feedback-items">'+items+'</ul></div>';
  }

  panel.innerHTML='<div class="results-panel show">'+
    '<div class="results-header"><h3>📊 Результаты оценивания</h3><div class="subtitle">Задание '+DATA[curSec].tasks[curTask].id+'</div></div>'+
    '<div class="total-score"><div class="big-number">'+total+'</div><div class="big-max">из 6 баллов (K1+K2+K3)</div><div class="grade-label '+gradeClass+'">'+gradeLabel+'</div></div>'+
    '<div class="criteria-grid">'+
    renderCriteria('k1','K1 Содержание',2)+
    renderCriteria('k2','K2 Сжатие',2)+
    renderCriteria('k3','K3 Логичность',2)+
    '<div class="criteria-card" style="border-left-color:#f093fb;"><div class="cr-header"><span class="cr-label">K4 Грамотность</span><span class="cr-score" style="color:#f093fb;font-size:1em;">🤖 ИИ</span></div><ul class="feedback-items"><li><span class="icon" style="color:#999;">→</span><span>Нажмите «ИИ-проверка» для проверки орфографии</span></li></ul></div>'+
    '</div>'+
    '<div class="results-footer"><p>📌 K1–K3 оцениваются автоматически. K4 требует ИИ-проверки Яндекс.Спеллером.</p></div>'+
    '</div>';

  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

// ====== ИИ ПРОВЕРКА ======
function doAiCheck(tid){
  if(aiChecking)return;
  var txt=texts[tid]||'';
  var container=document.getElementById('aiResults');
  if(!txt||!txt.trim()){alert('Сначала напишите изложение!');return;}

  var btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.innerHTML='<span class="loading-spinner"></span> ИИ проверяет...';
  aiChecking=true;

  aiSpellCheck(txt,function(err,errors){
    aiChecking=false;
    btn.disabled=false;btn.innerHTML='🤖 ИИ-проверка орфографии';
    if(err){container.innerHTML='<div class="fb show error">⚠️ '+err.message+'</div>';container.classList.add('show');return;}

    if(!errors||errors.length===0){
      container.innerHTML='<div class="ai-summary clean"><span class="emoji">🎉</span><div class="text"><h4>Ошибок не найдено!</h4><p>Яндекс.Спеллер не обнаружил орфографических ошибок.</p></div></div>';
    } else {
      var sorted=[...errors].sort(function(a,b){return a.pos-b.pos;});
      var highlighted='';var lastIdx=0;
      sorted.forEach(function(e){
        highlighted+=escHtml(txt.substring(lastIdx,e.pos));
        var tip=e.s&&e.s.length>0?' → '+e.s.join(', '):'';
        highlighted+='<span class="ai-err" data-tip="'+escHtml(e.word)+tip+'">'+escHtml(e.word)+'</span>';
        lastIdx=e.pos+e.len;
      });
      highlighted+=escHtml(txt.substring(lastIdx));

      var cards='';
      sorted.forEach(function(e,i){
        var wrong=escHtml(e.word);
        var correct=e.s&&e.s.length>0?e.s.map(function(s){return escHtml(s);}).join(' / '):'';
        var desc=e.type==='unknown word'?'Слово не найдено в словаре':e.type==='capitalization'?'Ошибка в заглавной букве':e.type==='grammar'?'Грамматическая ошибка':'Возможная ошибка';
        cards+='<div class="error-card"><div class="num">'+(i+1)+'</div><div class="content"><div><span class="wrong">'+wrong+'</span><span class="arrow">→</span><span class="correct">'+correct+'</span></div><div class="desc">'+desc+'</div></div></div>';
      });

      var wc=countW(txt);
      var errPct=Math.round(errors.length/Math.max(wc,1)*100);
      var quality=errPct<2?'Отлично!':errPct<5?'Хорошо':errPct<10?'Нужно поработать':'Много ошибок';

      container.innerHTML='<div class="ai-summary errors"><span class="emoji">🔍</span><div class="text"><h4>Найдено ошибок: '+errors.length+' ('+errPct+'%)</h4><p>Качество: <strong>'+quality+'</strong></p></div></div>';
      container.innerHTML+='<div class="highlighted-text">'+highlighted+'</div>';
      container.innerHTML+='<h4 style="margin:16px 24px 10px;color:#c0392b;">📋 Разбор ошибок:</h4>';
      container.innerHTML+='<div style="padding:0 24px;"><div class="error-cards">'+cards+'</div></div>';
    }
    container.classList.add('show');
    container.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

function markDone(tid){done.add(tid);save();mkTaskNav();confetti();}
function clearText(tid){if(!confirm('Очистить текст?'))return;texts[tid]='';save();render();}
function doCopy(){var ta=document.getElementById('wArea');if(ta&&ta.value){if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){alert('📋 Скопировано!');});}else{ta.select();document.execCommand('copy');alert('📋 Скопировано!');}}}
function togSrc(btn){var div=btn.nextElementSibling;if(div.style.display==='none'){div.style.display='block';btn.textContent='📖 Скрыть текст';}else{div.style.display='none';btn.textContent='📖 Показать исходный текст';}}
function togHints(btn){var div=btn.nextElementSibling;div.classList.toggle('show');btn.textContent=div.classList.contains('show')?'💡 Скрыть подсказки':'💡 Подсказки (микротемы)';}
function goPrev(){if(curTask>0){curTask--;mkTaskNav();render();window.scrollTo({top:0,behavior:'smooth'});}}
function goNext(){var sec=DATA[curSec];if(curTask<sec.tasks.length-1){curTask++;mkTaskNav();render();window.scrollTo({top:0,behavior:'smooth'});}}

function updProg(){var dc=done.size;document.getElementById('progText').textContent=dc+' / '+totalTasks;document.getElementById('progBar').style.width=(dc/totalTasks*100)+'%';}

function showStats(){
  var dc=done.size,pct=Math.round(dc/totalTasks*100);
  var h='<div class="stat-grid"><div class="stat-card"><div class="sv">'+dc+'</div><div class="sl">Выполнено</div></div><div class="stat-card"><div class="sv">'+(totalTasks-dc)+'</div><div class="sl">Осталось</div></div><div class="stat-card"><div class="sv">'+pct+'%</div><div class="sl">Прогресс</div></div></div>';
  h+='<h3 style="margin-top:16px;color:#764ba2;">По разделам:</h3>';
  DATA.forEach(function(sec){var st=sec.tasks.length;var sc=sec.tasks.filter(function(t){return done.has(t.id);}).length;var sp=Math.round(sc/st*100);h+='<div style="margin:8px 0;padding:8px 12px;background:#f8f9ff;border-radius:10px;"><div style="display:flex;justify-content:space-between;"><strong>'+sec.s+'</strong><span>'+sc+'/'+st+' ('+sp+'%)</span></div><div class="prog-bar" style="margin-top:4px;"><div class="prog-fill" style="width:'+sp+'%"></div></div></div>';});
  h+='<div style="text-align:center;margin-top:16px;"><button class="btn btn-del" onclick="resetAll()">🗑️ Сбросить прогресс</button></div>';
  document.getElementById('modalBody').innerHTML=h;document.getElementById('modalBg').classList.add('show');
}
function closeStats(){document.getElementById('modalBg').classList.remove('show');}
function resetAll(){if(!confirm('Сбросить весь прогресс?'))return;done=new Set();texts={};localStorage.removeItem('oge_st');closeStats();mkSecNav();mkTaskNav();render();}

function confetti(){var colors=['#FF6B9D','#C44DFF','#4DA6FF','#4DFF88','#FFD93D','#FF8C42','#ff6b6b','#26de81'];for(var i=0;i<40;i++){var c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(2+Math.random()*3)+'s';c.style.animationDelay=(Math.random()*0.5)+'s';var sz=5+Math.random()*8;c.style.width=sz+'px';c.style.height=sz+'px';c.style.borderRadius=Math.random()>0.5?'50%':'2px';document.body.appendChild(c);setTimeout(function(el){el.remove();},5500,c);}}

document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='s'){e.preventDefault();save();}});
init();
</script>
